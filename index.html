<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Pass 數值平衡模擬器 Pro</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1a73e8;
            border-bottom: 2px solid #e8f0fe;
            padding-bottom: 15px;
            margin-top: 0;
        }
        .config-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border: 1px solid #dee2e6;
        }
        .field {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #495057;
        }
        input, select, textarea {
            padding: 12px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #1a73e8;
            box-shadow: 0 0 0 3px rgba(26,115,232,0.1);
        }
        .full-width {
            grid-column: 1 / -1;
        }
        button {
            padding: 15px 30px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #1557b0;
        }
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }
        .card {
            background: #e8f0fe;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .card-label {
            font-size: 14px;
            color: #5f6368;
            margin-bottom: 5px;
        }
        .card-value {
            font-size: 24px;
            font-weight: bold;
            color: #1967d2;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        th {
            background-color: #f1f3f4;
            color: #202124;
            padding: 15px;
            font-weight: 600;
            border-bottom: 2px solid #dee2e6;
        }
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            text-align: right;
        }
        .tier-col { text-align: center; font-weight: bold; }
        .ratio-col { color: #d93025; font-weight: 500; }
        .error-banner {
            background-color: #fce8e6;
            color: #d93025;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            display: none;
            font-weight: bold;
            text-align: center;
        }
        .suggest-hint {
            font-size: 12px;
            color: #70757a;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Battle Pass 數值平衡模擬器 Pro</h1>
    
    <div id="errorBanner" class="error-banner"></div>

    <div class="config-section">
        <div class="field">
            <label>總目標押量 (Total Bet)</label>
            <input type="number" id="totalGoal" value="100000">
        </div>
        <div class="field">
            <label>免費獎勵佔比 (% of Total Bet)</label>
            <input type="number" id="freePercent" step="0.1" value="1">
        </div>
        <div class="field">
            <label>付費獎勵總價值 (Total Paid Value)</label>
            <input type="number" id="paidValue" value="2711">
        </div>
        <div class="field">
            <label>曲線模式 (Curve Mode)</label>
            <select id="curveMode" onchange="onCurveModeChange()">
                <option value="manual">手動填寫 (Manual)</option>
                <option value="linear">線性分配 (Linear)</option>
                <option value="growth" selected>成長曲線 (Growth)</option>
                <option value="steep">陡峭成長 (Steep)</option>
            </select>
        </div>

        <div id="suggestConfig" class="field" style="display:none;">
            <label>建議節點總數</label>
            <input type="number" id="tierCount" value="7" min="2" max="100" oninput="generateSuggestedRatios()">
            <div class="suggest-hint">系統將依曲線自動分配比例</div>
        </div>

        <div class="field full-width">
            <label id="ratioLabel">各節點難度比例 (%)</label>
            <textarea id="ratios" placeholder="例如: 5, 5, 10, 10, 15, 20, 35">5, 5, 10, 10, 15, 20, 35</textarea>
            <div class="suggest-hint">比例總和需為 100%。</div>
        </div>

        <button onclick="calculateBP()">立即計算並更新表格</button>
    </div>

    <div id="resultsArea" style="display:none;">
        <div class="summary-cards">
            <div class="card">
                <div class="card-label">免費線總價值</div>
                <div class="card-value" id="sumFree">0</div>
            </div>
            <div class="card">
                <div class="card-label">付費線總價值</div>
                <div class="card-value" id="sumPaid">0</div>
            </div>
            <div class="card">
                <div class="card-label">節點總數</div>
                <div class="card-value" id="sumTiers">0</div>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 80px;">節點</th>
                    <th>難度比例</th>
                    <th>單層目標</th>
                    <th>累積押量(進度)</th>
                    <th>免費獎勵價值</th>
                    <th>付費獎勵價值</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    function onCurveModeChange() {
        const mode = document.getElementById('curveMode').value;
        const suggestConfig = document.getElementById('suggestConfig');
        const ratiosInput = document.getElementById('ratios');
        
        if (mode === 'manual') {
            suggestConfig.style.display = 'none';
            ratiosInput.readOnly = false;
            ratiosInput.style.backgroundColor = 'white';
        } else {
            suggestConfig.style.display = 'flex';
            ratiosInput.readOnly = true;
            ratiosInput.style.backgroundColor = '#f1f3f4';
            generateSuggestedRatios();
        }
    }

    function generateSuggestedRatios() {
        const mode = document.getElementById('curveMode').value;
        const n = parseInt(document.getElementById('tierCount').value) || 7;
        let ratios = [];

        if (mode === 'linear') {
            const avg = (100 / n).toFixed(2);
            for(let i=0; i<n; i++) ratios.push(parseFloat(avg));
        } 
        else if (mode === 'growth' || mode === 'steep') {
            const k = (mode === 'growth') ? 1.5 : 2.5;
            let weights = [];
            let totalW = 0;
            for(let i=1; i<=n; i++) {
                let w = Math.pow(i, k);
                weights.push(w);
                totalW += w;
            }
            ratios = weights.map(w => parseFloat(((w / totalW) * 100).toFixed(2)));
        }

        const currentSum = ratios.reduce((a, b) => a + b, 0);
        const diff = 100 - currentSum;
        ratios[ratios.length - 1] = parseFloat((ratios[ratios.length - 1] + diff).toFixed(2));

        document.getElementById('ratios').value = ratios.join(', ');
    }

    function calculateBP() {
        const totalGoal = parseFloat(document.getElementById('totalGoal').value);
        const freePercent = parseFloat(document.getElementById('freePercent').value) / 100;
        const paidValue = parseFloat(document.getElementById('paidValue').value);
        const ratiosText = document.getElementById('ratios').value;
        
        const ratios = ratiosText.split(',').map(r => parseFloat(r.trim())).filter(r => !isNaN(r));
        const ratioSum = ratios.reduce((a, b) => a + b, 0);
        
        const errorBanner = document.getElementById('errorBanner');
        if (Math.abs(ratioSum - 100) > 0.1) {
            errorBanner.innerText = `錯誤：比例加總為 ${ratioSum.toFixed(2)}% (不等於 100%)。`;
            errorBanner.style.display = 'block';
            return;
        } else {
            errorBanner.style.display = 'none';
        }

        const freeTotalValue = totalGoal * freePercent;
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '';
        
        let cumulativeBet = 0;
        ratios.forEach((ratio, index) => {
            const ratioDec = ratio / 100;
            const tierGoal = totalGoal * ratioDec;
            cumulativeBet += tierGoal;
            const freeReward = freeTotalValue * ratioDec;
            const paidReward = paidValue * ratioDec;
            
            tableBody.innerHTML += `<tr>
                <td class="tier-col">${index + 1}</td>
                <td class="ratio-col">${ratio}%</td>
                <td>${Math.round(tierGoal).toLocaleString()}</td>
                <td>${Math.round(cumulativeBet).toLocaleString()}</td>
                <td>${freeReward.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                <td>${paidReward.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
            </tr>`;
        });

        document.getElementById('sumFree').innerText = freeTotalValue.toLocaleString();
        document.getElementById('sumPaid').innerText = paidValue.toLocaleString();
        document.getElementById('sumTiers').innerText = ratios.length;
        document.getElementById('resultsArea').style.display = 'block';
    }

    window.onload = () => {
        onCurveModeChange();
        calculateBP();
    };
</script>

</body>
</html>
